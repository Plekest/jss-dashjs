services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jss
      POSTGRES_PASSWORD: jss
      POSTGRES_DB: jss_dashjs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jss -d jss_dashjs"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    environment:
      DATABASE_URL: postgres://jss:jss@db:5432/jss_dashjs
      PORT: 3001
      CONNECTIONS_SECRET: ${CONNECTIONS_SECRET:-dev-insecure-secret}
    ports:
      - "3002:3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
